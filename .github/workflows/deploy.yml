name: Quizz du Berger Deploy

on:
  push:
    branches: [main] # Or the name of your main branch

jobs:
  test:
    name: Tests + type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            app-tanstack/package-lock.json
            api-express/package-lock.json

      - name: Install app dependencies
        working-directory: app-tanstack
        run: npm ci

      - name: Install api dependencies
        # tsconfig.app.json includes ../api-express/src/types/**/*.ts which
        # reference @prisma/client and express. Type-check needs those modules
        # resolvable on disk.
        working-directory: api-express
        run: npm ci

      - name: Generate Prisma client types
        # @prisma/client types are generated, not shipped. Without this the
        # type-check sees `Answer`/`User` as `any` (or errors, depending on version).
        working-directory: api-express
        run: npx prisma generate

      - name: Type-check
        working-directory: app-tanstack
        # `npm run typecheck` runs `tsr generate` first to emit the gitignored
        # routeTree.gen.ts, then `tsc -b`.
        run: npm run typecheck

      - name: Run tests
        working-directory: app-tanstack
        run: npm test

  deploy:
    name: Deploy to VPS
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: deployer
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |

            # Add npm global bin to PATH so pm2 is resolvable in this non-interactive shell
            export PATH="$HOME/.npm-global/bin:$PATH"

            echo "Vérification que pm2 est disponible"
            pm2 --version

            # Navigate to the quizz-berger project directory
            cd /var/www/quizz-berger

            # Pull the latest changes
            git pull origin main

            # Navigate to the app directory
            cd app-tanstack

            # Install dependencies
            npm ci --include=dev

            # Build the application (generates sitemap + vite build → dist/)
            npm run build

            # Restart or start the application using PM2
            pm2 restart quizz-du-berger-app-tanstack || pm2 start ecosystem.config.cjs

            # Navigate to the api directory
            cd ../api-express

            # Install dependencies
            npm ci --include=dev

            # Restart or start the application using PM2
            pm2 restart quizz-du-berger-api-express || pm2 start ecosystem.config.cjs

            # Wait for the apps to start
            sleep 10

            # Check if the apps are running (adjust the port if necessary)
            if curl -f http://localhost:5179/; then
              echo "Quizz du berger API is running correctly."
            else
              cd /var/www/quizz-berger/api-express
              pm2 delete quizz-du-berger-api-express
              pm2 start ecosystem.config.cjs
              echo "Quizz du berger API restarted."

              # Wait for the app to start
              sleep 10

              # Check if the app is running (adjust the port if necessary)
              if curl -f http://localhost:5179/; then
                echo "Quizz du berger API is running correctly."
              else
                echo "Quizz du berger API failed to start."
                exit 1
              fi
            fi
            # Check if the apps are running (adjust the port if necessary)
            if curl -f http://localhost:5178/; then
              echo "Quizz du berger APP is running correctly."
            else
              cd /var/www/quizz-berger/app-tanstack
              pm2 delete quizz-du-berger-app-tanstack
              pm2 start ecosystem.config.cjs
              echo "Quizz du berger APP restarted."

              # Wait for the app to start
              sleep 10

              # Check if the app is running (adjust the port if necessary)
              if curl -f http://localhost:5178/; then
                echo "Quizz du berger APP is running correctly."
              else
                echo "Quizz du berger APP failed to start."
                exit 1
              fi
            fi

  notify-failure:
    name: Notify Slack on failure
    needs: [test, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Determine which job failed
        id: which
        run: |
          if [ "${{ needs.test.result }}" = "failure" ]; then
            echo "stage=tests" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.deploy.result }}" = "failure" ]; then
            echo "stage=deploy" >> "$GITHUB_OUTPUT"
          else
            echo "stage=unknown" >> "$GITHUB_OUTPUT"
          fi

      - name: Post failure to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          STAGE: ${{ steps.which.outputs.stage }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL secret is not set; skipping notification."
            exit 0
          fi
          SHORT_SHA="${SHA:0:7}"
          PAYLOAD=$(jq -nc \
            --arg text ":x: *Quizz du Berger* — \`$STAGE\` failed on \`$REF\` (commit \`$SHORT_SHA\` by $ACTOR)\n<$RUN_URL|See workflow run>" \
            '{text: $text}')
          curl -sS -X POST -H 'Content-Type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"

  notify-success:
    name: Notify Slack on success
    needs: [test, deploy]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Post success to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REF: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL secret is not set; skipping notification."
            exit 0
          fi
          SHORT_SHA="${SHA:0:7}"
          PAYLOAD=$(jq -nc \
            --arg text ":white_check_mark: *Quizz du Berger* deployed on \`$REF\` (commit \`$SHORT_SHA\` by $ACTOR)\n<$RUN_URL|See workflow run>" \
            '{text: $text}')
          curl -sS -X POST -H 'Content-Type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
